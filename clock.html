<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock - Multi Timezone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }
    .clocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .clock-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .clock-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
    }
    .timezone-name {
      font-size: 1.3em;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 10px;
      text-align: center;
    }
    .timezone-info {
      font-size: 0.85em;
      color: #666;
      text-align: center;
      margin-bottom: 15px;
    }
    .digital-time {
      font-size: 3em;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      text-align: center;
      color: #333;
      margin: 15px 0;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .analog-clock {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: white;
      border: 3px solid #667eea;
      position: relative;
      margin: 20px auto;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }
    .clock-center {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #667eea;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 10px;
    }
    .hour-hand {
      width: 6px;
      height: 40px;
      background: #333;
      margin-left: -3px;
    }
    .minute-hand {
      width: 4px;
      height: 55px;
      background: #667eea;
      margin-left: -2px;
      z-index: 5;
    }
    .second-hand {
      width: 2px;
      height: 60px;
      background: #ef5350;
      margin-left: -1px;
      z-index: 3;
    }
    .date-display {
      font-size: 0.9em;
      color: #999;
      text-align: center;
      margin-top: 15px;
      font-style: italic;
    }
    .timezone-selector {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .selector-title {
      color: #333;
      margin-bottom: 15px;
      font-weight: 600;
    }
    .timezone-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tz-btn {
      padding: 8px 16px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s ease;
      font-size: 0.9em;
    }
    .tz-btn:hover, .tz-btn.active {
      background: #667eea;
      color: white;
    }
    .clock-number {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 0.9em;
      font-weight: 600;
      color: #667eea;
    }
    .clock-number span {
      display: inline-block;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .tick {
      position: absolute;
      width: 2px;
      height: 6px;
      background: #667eea;
      left: 50%;
      transform: translateX(-50%);
    }
    .current-location {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      font-size: 1.1em;
    }
    .current-location .flag {
      font-size: 1.5em;
      margin-right: 10px;
    }
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }
      .digital-time {
        font-size: 2em;
      }
      .clocks-grid {
        grid-template-columns: 1fr;
      }
      .analog-clock {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⏰ Digital Clock</h1>
      <p>Real-time Display Across Multiple Time Zones</p>
    </div>

    <div class="current-location" id="currentLocation">
      <span class="flag" id="locationFlag">🌍</span>
      <span id="locationText">Loading...</span>
    </div>

    <div class="timezone-selector">
      <div class="selector-title">Select Time Zones</div>
      <div class="timezone-list" id="timezoneList"></div>
    </div>

    <div class="clocks-grid" id="clocksGrid"></div>
  </div>

  <script>
    const timezones = [
      { name: 'UTC', offset: 0, flag: '🌍', id: 'UTC' },
      { name: 'London', offset: 0, flag: '🇬🇧', id: 'Europe/London' },
      { name: 'Paris', offset: 1, flag: '🇫🇷', id: 'Europe/Paris' },
      { name: 'Tokyo', offset: 9, flag: '🇯🇵', id: 'Asia/Tokyo' },
      { name: 'Sydney', offset: 10, flag: '🇦🇺', id: 'Australia/Sydney' },
      { name: 'Dubai', offset: 4, flag: '🇦🇪', id: 'Asia/Dubai' },
      { name: 'Singapore', offset: 8, flag: '🇸🇬', id: 'Asia/Singapore' },
      { name: 'Hong Kong', offset: 8, flag: '🇭🇰', id: 'Asia/Hong_Kong' },
      { name: 'New York', offset: -5, flag: '🇺🇸', id: 'America/New_York' },
      { name: 'Los Angeles', offset: -8, flag: '🇺🇸', id: 'America/Los_Angeles' },
      { name: 'Toronto', offset: -5, flag: '🇨🇦', id: 'America/Toronto' },
      { name: 'Mexico City', offset: -6, flag: '🇲🇽', id: 'America/Mexico_City' },
      { name: 'São Paulo', offset: -3, flag: '🇧🇷', id: 'America/Sao_Paulo' },
      { name: 'Mumbai', offset: 5.5, flag: '🇮🇳', id: 'Asia/Kolkata' },
      { name: 'Bangkok', offset: 7, flag: '🇹🇭', id: 'Asia/Bangkok' },
      { name: 'Manila', offset: 8, flag: '🇵🇭', id: 'Asia/Manila' },
      { name: 'Berlin', offset: 1, flag: '🇩🇪', id: 'Europe/Berlin' },
      { name: 'Moscow', offset: 3, flag: '🇷🇺', id: 'Europe/Moscow' },
      { name: 'Istanbul', offset: 3, flag: '🇹🇷', id: 'Europe/Istanbul' },
      { name: 'Cairo', offset: 2, flag: '🇪🇬', id: 'Africa/Cairo' },
      { name: 'Johannesburg', offset: 2, flag: '🇿🇦', id: 'Africa/Johannesburg' },
      { name: 'Auckland', offset: 12, flag: '🇳🇿', id: 'Pacific/Auckland' },
    ];

    let selectedTimezones = ['Europe/London', 'Asia/Tokyo', 'America/New_York', 'Asia/Dubai', 'Australia/Sydney', 'Asia/Manila'];

    function initializeTimezoneSelector() {
      const list = document.getElementById('timezoneList');
      list.innerHTML = '';
      timezones.forEach(tz => {
        const btn = document.createElement('button');
        btn.className = 'tz-btn' + (selectedTimezones.includes(tz.id) ? ' active' : '');
        btn.textContent = `${tz.flag} ${tz.name}`;
        btn.onclick = () => toggleTimezone(tz.id, btn);
        list.appendChild(btn);
      });
    }

    function toggleTimezone(tzId, btn) {
      if (selectedTimezones.includes(tzId)) {
        selectedTimezones = selectedTimezones.filter(id => id !== tzId);
        btn.classList.remove('active');
      } else {
        selectedTimezones.push(tzId);
        btn.classList.add('active');
      }
      updateClocks();
    }

    function getTimeInTimezone(tzId) {
      try {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tzId,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
        const parts = formatter.formatToParts(new Date());
        let time = {};
        parts.forEach(part => {
          time[part.type] = part.value;
        });
        return `${time.hour}:${time.minute}:${time.second}`;
      } catch (e) {
        return 'N/A';
      }
    }

    function getDateInTimezone(tzId) {
      try {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tzId,
          weekday: 'short',
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        return formatter.format(new Date());
      } catch (e) {
        return '';
      }
    }

    function getTimeComponentsInTimezone(tzId) {
      try {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tzId,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
        const parts = formatter.formatToParts(new Date());
        let time = {};
        parts.forEach(part => {
          time[part.type] = parseInt(part.value);
        });
        return {
          hours: time.hour || 0,
          minutes: time.minute || 0,
          seconds: time.second || 0
        };
      } catch (e) {
        return { hours: 0, minutes: 0, seconds: 0 };
      }
    }

    function createClockCard(tzInfo) {
      const tz = timezones.find(t => t.id === tzInfo);
      const timeStr = getTimeInTimezone(tzInfo);
      const dateStr = getDateInTimezone(tzInfo);
      const timeComponents = getTimeComponentsInTimezone(tzInfo);

      const card = document.createElement('div');
      card.className = 'clock-card';
      card.innerHTML = `
        <div class="timezone-name">${tz.flag} ${tz.name}</div>
        <div class="timezone-info">UTC${tz.offset >= 0 ? '+' : ''}${tz.offset}</div>
        <div class="digital-time" data-tz="${tzInfo}">${timeStr}</div>
        <div class="analog-clock" data-tz="${tzInfo}">
          ${generateClockNumbers()}
          ${generateClockTicks()}
          <div class="hand hour-hand" style="transform: rotate(${(timeComponents.hours % 12) * 30 + timeComponents.minutes * 0.5}deg)"></div>
          <div class="hand minute-hand" style="transform: rotate(${timeComponents.minutes * 6 + timeComponents.seconds * 0.1}deg)"></div>
          <div class="hand second-hand" style="transform: rotate(${timeComponents.seconds * 6}deg)"></div>
          <div class="clock-center"></div>
        </div>
        <div class="date-display">${dateStr}</div>
      `;
      return card;
    }

    function generateClockNumbers() {
      let html = '<div class="clock-number">';
      for (let i = 1; i <= 12; i++) {
        const angle = (i * 30 - 90) * (Math.PI / 180);
        const x = 50 + 40 * Math.cos(angle);
        const y = 50 + 40 * Math.sin(angle);
        html += `<span style="left: ${x}%; top: ${y}%; width: 20px; margin-left: -10px; margin-top: -10px;">${i}</span>`;
      }
      html += '</div>';
      return html;
    }

    function generateClockTicks() {
      let html = '';
      for (let i = 0; i < 60; i++) {
        const angle = (i * 6) * (Math.PI / 180);
        const x = 50 + 45 * Math.cos(angle);
        const y = 50 + 45 * Math.sin(angle);
        html += `<div class="tick" style="left: ${x}%; top: ${y}%; transform: translate(-50%, -50%) rotate(${i * 6}deg)"></div>`;
      }
      return html;
    }

    function updateClocks() {
      const grid = document.getElementById('clocksGrid');
      grid.innerHTML = '';
      selectedTimezones.forEach(tzId => {
        grid.appendChild(createClockCard(tzId));
      });
      updateAnalogClocks();
    }

    function updateAnalogClocks() {
      selectedTimezones.forEach(tzId => {
        const timeComponents = getTimeComponentsInTimezone(tzId);
        const clock = document.querySelector(`.analog-clock[data-tz="${tzId}"]`);
        const digitalTime = document.querySelector(`.digital-time[data-tz="${tzId}"]`);

        if (clock && digitalTime) {
          // Update digital time
          const hours = String(timeComponents.hours).padStart(2, '0');
          const minutes = String(timeComponents.minutes).padStart(2, '0');
          const seconds = String(timeComponents.seconds).padStart(2, '0');
          digitalTime.textContent = `${hours}:${minutes}:${seconds}`;

          // Update analog clock hands
          const hourHand = clock.querySelector('.hour-hand');
          const minuteHand = clock.querySelector('.minute-hand');
          const secondHand = clock.querySelector('.second-hand');

          hourHand.style.transform = `rotate(${(timeComponents.hours % 12) * 30 + timeComponents.minutes * 0.5}deg)`;
          minuteHand.style.transform = `rotate(${timeComponents.minutes * 6 + timeComponents.seconds * 0.1}deg)`;
          secondHand.style.transform = `rotate(${timeComponents.seconds * 6}deg)`;
        }
      });
    }

    function updateCurrentLocation() {
      const now = new Date();
      const localFormatter = new Intl.DateTimeFormat('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
      
      document.getElementById('locationText').textContent = `Your Time: ${localFormatter.format(now)}`;
    }

    // Initialize
    initializeTimezoneSelector();
    updateClocks();
    updateCurrentLocation();

    // Update every second
    setInterval(() => {
      updateAnalogClocks();
      updateCurrentLocation();
    }, 1000);

    // Responsive grid adjustment
    window.addEventListener('resize', () => {
      const grid = document.getElementById('clocksGrid');
      grid.style.gridTemplateColumns = `repeat(auto-fit, minmax(${window.innerWidth < 600 ? '100%' : '280px'}, 1fr))`;
    });
  </script>
</body>
</html>
